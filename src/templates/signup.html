<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — FlowSynth</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        :root {
            --bg: #07070d;
            --bg-panel: rgba(18, 18, 26, 0.75);
            --bg-input: rgba(10, 10, 15, 0.6);
            --text: #e0e0e0;
            --text-secondary: #888;
            --text-muted: #555;
            --border: rgba(255,255,255,0.06);
            --border-input: rgba(255,255,255,0.08);
            --border-focus: rgba(124,92,252,0.5);
            --glow: rgba(124,92,252,0.12);
            --accent: #7c5cfc;
            --accent-hover: #6a4ae8;
            --accent-blue: #60a5fa;
            --error-bg: rgba(239,68,68,0.1);
            --error-border: rgba(239,68,68,0.25);
            --error-text: #f87171;
            --success: #34d399;
            --brand-gradient: linear-gradient(135deg, #7c5cfc, #60a5fa);
        }
        [data-theme="light"] {
            --bg: #f0ebf8;
            --bg-panel: rgba(255,255,255,0.88);
            --bg-input: rgba(245, 240, 255, 0.7);
            --text: #1a1a2e;
            --text-secondary: #555;
            --text-muted: #999;
            --border: rgba(124,92,252,0.1);
            --border-input: rgba(124,92,252,0.15);
            --border-focus: rgba(124,92,252,0.45);
            --glow: rgba(124,92,252,0.18);
            --accent: #7c5cfc;
            --accent-hover: #6a4ae8;
            --accent-blue: #4b8bef;
            --error-bg: rgba(239,68,68,0.08);
            --error-border: rgba(239,68,68,0.2);
            --error-text: #dc2626;
            --success: #059669;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .split-layout {
            display: flex;
            width: 100%;
            max-width: 960px;
            min-height: 600px;
            border-radius: 20px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: fadeUp 0.6s ease-out;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        .brand-panel {
            flex: 1;
            background: linear-gradient(145deg, rgba(124,92,252,0.12), rgba(96,165,250,0.06));
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .brand-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124,92,252,0.15), transparent 70%);
            pointer-events: none;
        }
        .brand-panel::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 350px; height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(96,165,250,0.1), transparent 70%);
            pointer-events: none;
        }
        .brand-content { position: relative; z-index: 1; }
        .brand-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 2.5rem; }
        .brand-logo svg { width: 38px; height: 38px; }
        .brand-name {
            font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em;
            background: var(--brand-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .brand-tagline { font-size: 1.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 1rem; }
        .brand-tagline .highlight {
            background: var(--brand-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .brand-desc { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.7; max-width: 320px; }
        .brand-features { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 0.75rem; }
        .brand-feature { display: flex; align-items: center; gap: 0.75rem; font-size: 0.85rem; color: var(--text-secondary); }
        .brand-feature .check {
            width: 22px; height: 22px; border-radius: 50%;
            background: rgba(52,211,153,0.12); color: #34d399;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; flex-shrink: 0;
        }

        .form-panel {
            width: 420px;
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .form-header { margin-bottom: 2rem; }
        .form-header h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.35rem; }
        .form-header p { color: var(--text-secondary); font-size: 0.88rem; }
        .form-header p a { color: var(--accent); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .form-header p a:hover { color: var(--accent-blue); }

        .error-msg {
            display: none;
            background: var(--error-bg); border: 1px solid var(--error-border); border-radius: 10px;
            padding: 0.75rem 1rem; color: var(--error-text); font-size: 0.82rem;
            margin-bottom: 1.25rem; line-height: 1.5; animation: shake 0.35s ease-out;
        }
        @keyframes shake {
            0%,100% { transform:translateX(0); }
            20% { transform:translateX(-4px); }
            40% { transform:translateX(4px); }
            60% { transform:translateX(-3px); }
            80% { transform:translateX(3px); }
        }
        .form-group { margin-bottom: 1.25rem; position: relative; }
        label {
            display: block; font-size: 0.78rem; font-weight: 500;
            color: var(--text-secondary); margin-bottom: 0.4rem; letter-spacing: 0.01em;
        }
        .input-wrap { position: relative; }
        .input-wrap .icon {
            position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 0.9rem; pointer-events: none; transition: color 0.2s;
        }
        .input-wrap input {
            width: 100%; background: var(--bg-input);
            border: 1.5px solid var(--border-input); border-radius: 10px;
            padding: 0.8rem 1rem 0.8rem 2.6rem; color: var(--text);
            font-size: 0.92rem; font-family: inherit; outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
        }
        .input-wrap input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--glow);
        }
        .input-wrap input:focus ~ .icon { color: var(--accent); }
        .input-wrap input::placeholder { color: var(--text-muted); opacity: 0.5; }

        .auth-btn {
            width: 100%; background: var(--brand-gradient); color: #fff; border: none;
            border-radius: 10px; padding: 0.85rem; font-size: 0.92rem; font-weight: 600;
            cursor: pointer; transition: transform 0.15s, box-shadow 0.25s, opacity 0.2s;
            position: relative; overflow: hidden; letter-spacing: 0.01em; margin-top: 0.25rem;
        }
        .auth-btn::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.12) 50%, transparent 60%);
            transition: transform 0.5s; transform: translateX(-100%);
        }
        .auth-btn:hover::after { transform: translateX(100%); }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,92,252,0.3); }
        .auth-btn:active { transform: translateY(0) scale(0.98); }
        .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .auth-btn:disabled::after { display: none; }

        .password-hint {
            font-size: 0.72rem; color: var(--text-muted); margin-top: 0.3rem;
        }
        .password-hint .valid { color: var(--success); }
        .password-hint .invalid { color: var(--error-text); }

        .theme-toggle {
            position: fixed; top: 1.25rem; right: 1.25rem; z-index: 10;
            background: var(--bg-panel); border: 1px solid var(--border);
            border-radius: 10px; padding: 0.5rem 0.65rem; cursor: pointer;
            font-size: 1.1rem; backdrop-filter: blur(12px); color: var(--text);
            transition: background 0.2s, transform 0.15s;
        }
        .theme-toggle:hover { transform: scale(1.05); }

        @media (max-width: 768px) {
            .split-layout { flex-direction: column; min-height: auto; max-width: 420px; }
            .brand-panel { padding: 2rem 1.75rem; }
            .brand-panel::before, .brand-panel::after { display: none; }
            .brand-tagline { font-size: 1.4rem; }
            .brand-features { flex-direction: row; flex-wrap: wrap; margin-top: 1.5rem; }
            .form-panel { width: 100%; padding: 2rem 1.75rem; }
            .form-header h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>

    <div class="split-layout">
        <div class="brand-panel">
            <div class="brand-content">
                <div class="brand-logo">
                    <svg viewBox="0 0 32 32" width="38" height="38">
                        <rect width="32" height="32" rx="10" fill="#12121a"/>
                        <defs><linearGradient id="g" x1="0" y1="0" x2="32" y2="32"><stop offset="0%" stop-color="#7c5cfc"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient></defs>
                        <rect x="8" y="7" width="3.5" height="18" rx="1.75" fill="url(#g)"/>
                        <rect x="12" y="7" width="10" height="3.5" rx="1.75" fill="url(#g)"/>
                        <rect x="12" y="14" width="7" height="3.5" rx="1.75" fill="url(#g)"/>
                        <path d="M7.75 22 Q14 27 22 22 T28 25" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span class="brand-name">FlowSynth</span>
                </div>
                <div class="brand-tagline">Join the<br><span class="highlight">research revolution</span></div>
                <div class="brand-desc">Create an account to save your research history and access it anytime.</div>
            </div>
            <div class="brand-features">
                <div class="brand-feature"><span class="check">✓</span> Save your research history</div>
                <div class="brand-feature"><span class="check">✓</span> AI-powered multi-agent pipeline</div>
                <div class="brand-feature"><span class="check">✓</span> Free &amp; no credit card required</div>
            </div>
        </div>

        <div class="form-panel">
            <div class="form-header">
                <h2>Create account</h2>
                <p>Already have one? <a href="/auth/signin">Sign in</a></p>
            </div>

            <div class="error-msg" id="errorMsg"></div>

            <form id="signup-form">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <div class="input-wrap">
                        <span class="icon">✉</span>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <span class="icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="At least 4 characters" required autocomplete="new-password" oninput="checkPassword(this.value)">
                    </div>
                    <div class="password-hint" id="pwHint">Must be at least 4 characters</div>
                </div>
                <button type="submit" class="auth-btn" id="submitBtn">Create Account</button>
            </form>
        </div>
    </div>

    <script>
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const saved = localStorage.getItem('flowsynth-theme') || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', saved);
        document.getElementById('themeToggle').textContent = saved === 'dark' ? '🌙' : '☀️';

        function toggleTheme() {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('flowsynth-theme', next);
            document.getElementById('themeToggle').textContent = next === 'dark' ? '🌙' : '☀️';
        }

        function checkPassword(val) {
            const h = document.getElementById('pwHint');
            if (val.length === 0) { h.innerHTML = 'Must be at least 4 characters'; h.style.color = ''; return; }
            if (val.length < 4) { h.innerHTML = '✗ Too short (' + val.length + '/4)'; h.className = 'password-hint invalid'; }
            else { h.innerHTML = '✓ Good length'; h.className = 'password-hint valid'; }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const nextUrl = urlParams.get('next') || '/';

        // Preserve next param in cross-link to signin
        if (urlParams.has('next')) {
            const link = document.querySelector('a[href="/auth/signin"]');
            if (link) link.href = '/auth/signin?next=' + encodeURIComponent(nextUrl);
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const err = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            err.style.display = 'none';

            try {
                const resp = await fetch('/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                    })
                });
                const data = await resp.json();
                if (resp.ok) {
                    localStorage.setItem('flowsynth-token', data.token);
                    localStorage.setItem('flowsynth-email', data.user.email);
                    window.location.href = nextUrl;
                } else {
                    err.textContent = data.error || 'Sign up failed';
                    err.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                }
            } catch {
                err.textContent = 'Network error. Please try again.';
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
